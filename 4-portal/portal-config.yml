# ===========================================
# DSI Ecosystem (Captain 「インパクト発見」、2026-05-11 統合)
# agoora は DSI Ecosystem の Tier 2 active member として再定位
# ===========================================
dsi_ecosystem:
  description: |
    DSI (Domain-Specialized Instruction) エコシステム。業界 × 言語 × 規模を
    選ぶだけで Skills + Instructions + Templates を自動配置。
    agoora は dsi-wizard の Web GUI 版 + knowledge hub として位置付け。

  members:
    dsi-kit-library:
      tier: 1-mature
      role: core-cli-and-library
      tech: [Python, Mixer CLI, YAML configs]
      url: github.com/riku1215/dsi-kit-library
      knowledge_assets: [paw-sensor#194 由来 新規 PJ 立ち上げ完全自動化 stack]

    dsi-wizard:
      tier: 2-active
      role: vscode-ide-gui
      tech: [TypeScript, VS Code Extension API, esbuild]
      url: github.com/riku1215/dsi-wizard
      issues: 11
      features: [F1-F7 from Epic#1, "10 通り R&D wizard" #13]

    agoora:                  # ★ 2026-05-11 新規 member 認定
      tier: 2-active
      role: web-gui-and-knowledge-hub
      tech: [Python (FastAPI), JS (vanilla SPA), Cytoscape, ChromaDB, marked.js]
      url: github.com/riku1215/agoora
      pairs_with: dsi-wizard       # 同型 product、棲み分け: browser vs IDE
      derived_features:
        - tenfold-rd skill (dsi-wizard#13 由来、researcher 役)
        - Mixer CLI 統合 (Phase 2、portal-api /dsi/apply endpoint)

    dsi-factory:
      tier: 3-early
      role: auto-scaffold-pipeline
      status: spec

    dsi-improver:
      tier: 3-early
      role: improvement-engine

    dsi-core:
      tier: 3-early
      role: shared-core

    dsi-presets-*:
      tier: 3-early
      role: business-presets
      count: 5

    dsi-benchmark-results:        # ★ 2026-05-11 追加 (Captain 指示)
      tier: 3-archived
      role: nightly-benchmark-archive
      tech: [JSON, Markdown]
      url: github.com/riku1215/dsi-benchmark-results
      status: archived (on-hold topic)
      knowledge_assets:
        - class-weaver#113 由来 C02/C03/LAHC アルゴ benchmark 結果
        - agora#59 K1-K10 知見の実証データ
      agoora_integration:
        - Phase 2 で agoora 自己改善ループ benchmark 保存先候補
        - I1-I5 disruptive innovation の効果測定 archive

    skills:                       # ★ 2026-05-11 追加、QUARD 独自 T3 skills
      tier: 1-mature
      role: quard-custom-skills-collection
      tech: [Markdown SKILL.md format, Claude Code compatible]
      url: github.com/riku1215/skills
      count: 4
      members: [competitor-loop, label-migration, multi-llm-review, nano-banana-image-gen]
      battle_tested_in: 28+ repo eco
      agoora_integration:
        - critic 役: multi-llm-review + competitor-loop
        - historian 役: label-migration
        - researcher 役: competitor-loop (Phase 2)
        - coder 役: nano-banana-image-gen (Phase 2 UI mockup)

  relations:
    - {from: agoora, to: dsi-kit-library, type: integrates}
    - {from: agoora, to: dsi-wizard, type: same-type-different-gui}
    - {from: agoora, to: agora, type: inherits}
    - {from: dsi-wizard, to: dsi-kit-library, type: depends-on}
    - {from: paw-sensor, to: dsi-kit-library, type: contributed-to (#194)}

  phase_5_dsi_unified_release:
    name: "DSI Ecosystem 統一リリース"
    products: [dsi-kit-library, dsi-wizard, agoora]
    timing: Phase 5 商用化と同時
    pitch: "業界別 DSI を IDE / Web / CLI から自由選択"
